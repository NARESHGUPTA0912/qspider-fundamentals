<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 align="center"><u><sup><i><big><b>Table in HTML</b></big></i></sup></u></h1>
    <table border="1" cellpadding="10" rules="all" align="center">
      <caption>
        <B><u><i><big>PRODUCTS</big></i></u></B>
      </caption>
      <thead align="center">
        <tr>
          <th>S.No</th>
          <th>Items</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody align="center">
        <tr>
          <td>1.</td>
          <td>Cold drinks</td>
          <td>200</td>
        </tr>
        <tr>
          <td>2.</td>
          <td>Pizza</td>
          <td>249</td>
        </tr>
        <tr>
          <td>3.</td>
          <td>Kurkure</td>
          <td rowspan="2">99</td>
        </tr>
        <tr>
          <td>4.</td>
          <td>chips</td>
          <!-- <td>50</td> -->
        </tr>
      </tbody>

      <tfoot align="center">
        <tr>
          <td colspan="2"><b>Total Price</b></td>
          <td>549</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
