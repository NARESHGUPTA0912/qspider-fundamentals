<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/8539/8539259.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Project</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>

    <!-- Loader -->
    <div class="loader-container" id="loader">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/8539/8539259.png">
            <h1>ShopEase</h1>
        </div>
        <div class="spinner"></div>
        <p>Loading amazing products...</p>
    </div>

    <!-- Login -->
    <div class="login-container hidden" id="login">
        <h2>Welcome to <br>ShopEase</h2>

        <input type="email" placeholder="Enter Email" required>
        <input type="password" placeholder="Enter Password" required>

        <button>Login</button>
        <p class="signup-text">Don’t have an account? <span>Sign up</span></p>
    </div>

    <script src="./src/main.js"></script>
</body>
</html>
